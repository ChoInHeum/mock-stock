name: 기능 요청
description: 새로운 기능 개발 작업을 정의합니다.
title: "[feat] "
labels: ["feature"]
body:
  - type: textarea
    id: description
    attributes:
      label: 설명
      description: 어떤 기능을 개발할지 명확하게 작성해주세요.
      placeholder: 주식 종목 검색 API를 구현합니다.
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 필요한 이유
      description: 이 기능이 왜 필요한가요?
      placeholder: 사용자가 종목을 찾으려면 검색 기능이 필수입니다.
    validations:
      required: true

  - type: textarea
    id: todo
    attributes:
      label: 작업 목록
      description: 구현에 필요한 세부 작업을 체크리스트로 작성해주세요.
      placeholder: |
        - [ ] 검색 API 엔드포인트 설계
        - [ ] Service/Repository 구현
        - [ ] 테스트 작성
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 영역
      options:
        - client
        - server
        - db/infra
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 추가 정보
      description: 참고 자료, 화면 설계 등이 있으면 첨부해주세요.
    validations:
      required: false
